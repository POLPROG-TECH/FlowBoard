<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- FlowBoard Logo — Dark Mode -->
  <defs>
    <linearGradient id="iconBg" x1="0" y1="6" x2="38" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7b1a"/>
      <stop offset="1" stop-color="#e05800"/>
    </linearGradient>
    <linearGradient id="colG" x1="0" y1="10" x2="0" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff"/>
      <stop offset="1" stop-color="#fff" stop-opacity=".7"/>
    </linearGradient>
  </defs>
  <!-- Icon background -->
  <rect x="2" y="6" width="36" height="36" rx="9" fill="url(#iconBg)"/>
  <!-- Kanban columns — ascending = progress -->
  <rect x="8" y="24" width="6" height="12" rx="2" fill="url(#colG)" opacity=".6"/>
  <rect x="17" y="18" width="6" height="18" rx="2" fill="url(#colG)" opacity=".8"/>
  <rect x="26" y="12" width="6" height="24" rx="2" fill="url(#colG)"/>
  <!-- Flow arrow -->
  <path d="M9 15 C14 15, 17 11, 28 11" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity=".5"/>
  <path d="M25.5 8.5 L28.5 11 L25.5 13.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".5"/>
  <!-- Wordmark (light text for dark backgrounds) -->
  <text x="46" y="34" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">
    <tspan>Flow</tspan><tspan fill="#fb6400">Board</tspan>
  </text>
</svg>
