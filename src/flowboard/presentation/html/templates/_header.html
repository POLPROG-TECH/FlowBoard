<header class="app-header">
  <div class="header-inner">
    <a href="#" class="header-brand" onclick="return false">
      <svg class="header-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="40" height="40" rx="10" fill="var(--primary, #6366f1)"/>
        <rect x="7" y="20" width="7" height="13" rx="2.5" fill="#fff" opacity=".7"/>
        <rect x="16.5" y="14" width="7" height="19" rx="2.5" fill="#fff" opacity=".85"/>
        <rect x="26" y="8" width="7" height="25" rx="2.5" fill="#fff"/>
        <path d="M8 11 C14 11, 16 7, 28 7" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity=".6"/>
        <path d="M25 4.5 L28.5 7 L25 9.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".6"/>
      </svg>
      <span class="header-title">{{ title }}</span>
    </a>
    <div class="header-info">
      <div class="header-subtitle">{{ subtitle }}</div>
    </div>
    <div class="header-controls">
      {% if show_refresh_meta %}
      <div class="meta">
        {{ t("format.generated_at", date=generated_at) }}{% if company_name %} · {{ company_name }}{% endif %}
      </div>
      {% endif %}
      <button class="settings-btn" onclick="openSettings()" aria-haspopup="dialog">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 0 1-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 0 1 .947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 0 1 2.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 0 1 2.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 0 1 .947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 0 1-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 0 1-2.287-.947zM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" clip-rule="evenodd"/></svg>
        <span>{{ t("dashboard.configure") }}</span>
      </button>
    </div>
  </div>
</header>
